sections:
  - id: preamble
    level: 2
    bodyZh: |+
      ![图片](./assets/lamborghini-huracan-gt3-evo/welcome-hero.png)
      
      #### 亲爱的 iRACING 用户：
      
      恭喜您购入 Lamborghini Huracán GT3 EVO！iRacing 全体团队感谢您的支持与对我们产品的认可。我们致力于提供极致的模拟赛车体验，也希望您驾驶这辆新赛车时，能在赛道上收获无限激情！Lamborghini 多年的赛车传承汇聚于 Huracán GT3 EVO 之中。作为 Lamborghini 面向全球跑车赛事推出的新一代 GT3 赛车，它由位于圣亚加塔·波隆尼的 Lamborghini Squadra Corse 赛车运动部门自主开发。在前代 Huracán GT3 成功基础上，新车采用与 Dallara 联合研发的升级空气动力学套件，并搭载强劲的 5.2 升 V10 发动机。
      
      2020 年是该车硕果累累的一年：Paul Miller Racing 包揽了 IMSA WeatherTech 跑车锦标赛全赛季积分榜和耐力杯积分榜的车手与车队冠军。大西洋彼岸，Barwell Motorsport 驾驶该车为 Lamborghini 赢得品牌首个英国 GT 锦标赛冠军；斯帕 24 小时耐力赛组别冠军以及 GT 世界挑战赛的多场胜利，则为这一辉煌赛季画上圆满句号。
      
      本指南将介绍如何充分发挥这辆新赛车的性能，包括如何在离开赛道后调整车辆设定，以及驾驶时会在座舱内看到哪些信息。希望本指南能帮助您尽快熟悉赛车、提升圈速。
      
      再次感谢您的购买，赛道上见！
      
      ![图片](./assets/lamborghini-huracan-gt3-evo/welcome-car.png)
    bodyEn: |+
      ![Image](./assets/lamborghini-huracan-gt3-evo/welcome-hero.png)
      
      #### DEAR iRACING USER,
      
      Congratulations on your purchase of the Lamborghini Huracán GT3 EVO! From all of us at iRacing, we appreciate your support and your commitment to our product. We aim to deliver the ultimate sim racing experience, and we hope that you’ll find plenty of excitement with us behind the wheel of your new car! Years of racing heritage come together in the Lamborghini Huracán GT3 EVO, Lamborghini’s latest GT3 challenger in sports car racing series from around the world. Developed in house in Sant’Agata Bolognese by Lamborghini Squadra Corse, the Huracán GT3 EVO builds on the winning formula of its predecessor, the Huracán GT3, with improved aerodynamics developed in conjunction with Dallara and a powerful 5.2-liter V10 engine.
      
      2020 was a banner year for the car, with a clean sweep of the IMSA WeatherTech SportsCar Championship’s driver and team titles in both its full-season and endurance race standings for Paul Miller Racing. Across the Atlantic, Barwell Motorsport ran the car to Lamborghini’s first British GT title, while a class victory in the 24 Hours of Spa and multiple GT World Challenge victories rounded out a stellar season.
      
      The following guide explains how to get the most out of your new car, from how to adjust its settings off of the track to what you’ll see inside of the cockpit while driving. We hope that you’ll find it useful in getting up to speed.
      
      Thanks again for your purchase, and we’ll see you on the track!
      
      ![Image](./assets/lamborghini-huracan-gt3-evo/welcome-car.png)

