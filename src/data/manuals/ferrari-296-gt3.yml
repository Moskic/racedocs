sections:
  - id: preamble
    level: 2
    bodyZh: |+
      ![欢迎页面](./assets/ferrari-296-gt3/welcome-hero.png)

      #### 亲爱的 iRacing 用户：

      296 GT3 是 Ferrari 进军 GT3 赛事的最新力作，于 2023 赛季在 IMSA WeatherTech 跑车锦标赛及其他全球主要锦标赛中首次亮相。它接替了 2020 年首次参赛的 488 GT3 EVO，并在后者成功基础上进一步发展：车队调整设置更加便捷，下压力也比前代显著提升。

      与公路版车型一样，296 GT3 搭载 V6 发动机，其 2.9 升动力单元能够输出 600 马力。在代托纳 24 小时耐力赛的首秀中，共有四辆 296 GT3 分别参加 IMSA GTD 与 GTD Pro 组别；仅仅数月后，该车便在纽博格林的一场 24 小时耐力赛中取得首胜。本指南将说明如何充分发挥新车的性能，涵盖从赛道外的车辆设置调整，到驾驶时在座舱内看到的各种信息。希望本指南能帮助您快速上手。

      再次感谢您的购买，我们赛道上见！

      ![Ferrari 296 GT3 赛车](./assets/ferrari-296-gt3/welcome-car.png)

    bodyEn: |+
      ![Image](./assets/ferrari-296-gt3/welcome-hero.png)
      
      #### DEAR iRACING USER,
      
      Ferrari’s latest foray into GT3 racing, the 296 GT3 made its debut in the IMSA WeatherTech SportsCar Championship and other major global championships in time for the 2023 season. It succeeds the 488 GT3 EVO that made its debut in 2020, and it was designed to build on that car’s successes with easier setup modifications for the crew and significantly more downforce than its predecessor.
      
      Powered by a V6 engine just like its road-going counterpart, the 296 GT3 is capable of producing 600 horsepower from its 2.9-liter powerplant. Four cars took to the track across IMSA’s GTD and GTD Pro classes in its debut at the 24 Hours of Daytona, and the car took its first win in a twice-around-the-clock endurance race a few short months later at the Nürburgring. The following guide explains how to get the most out of your new car, from how to adjust its settings off of the track to what you’ll see inside of the cockpit while driving. We hope that you’ll find it useful in getting up to speed.
      
      Thanks again for your purchase, and we’ll see you on the track!
      
      ![Image](./assets/ferrari-296-gt3/welcome-car.png)

