sections:
  - id: preamble
    level: 2
    bodyEn: |+
      ![Image](./assets/mazda-mx-5-cup/welcome-hero.png)
      
      #### DEAR iRACING USER,
      
      Congratulations on your iRacing membership, and we hope you enjoy the Global Mazda MX-5 Cup car. From all of us at iRacing, we appreciate your support and your commitment to our product. We aim to deliver the ultimate sim racing experience, and we hope that you’ll find plenty of excitement with us behind the wheel of your new car!
      
      The following guide explains how to get the most out of your new car, from how to adjust its settings off of the track to what you’ll see inside of the cockpit while driving. We hope that you’ll find it useful in getting up to speed.
      
      Thanks again for your purchase, and we’ll see you on the track!
      
      ![Image](./assets/mazda-mx-5-cup/welcome-car.png)

