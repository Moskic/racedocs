  - id: advanced-setup-options
    level: 2
    titleZh: "高级设置选项"
    titleEn: "ADVANCED SETUP OPTIONS"
    bodyZh: |+
      > 本节面向希望深入了解车辆各项设置的进阶用户。调整以下参数并非必要操作，而且可能显著改变车辆的操控特性。建议所有调整都采用小幅渐进的方式，每次仅更改一个变量，然后上赛道测试效果。

    bodyEn: |+
      
      > This section is aimed toward more advanced users who want to dive deeper into the different aspects of the vehicle’s setup. Making adjustments to the following parameters is not required and can lead to significant changes in the way a vehicle handles. It is recommended that any adjustments are made in an incremental fashion and only singular variables are adjusted before testing changes.

  - id: suspension
    level: 2
    titleZh: "悬架"
    titleEn: "SUSPENSION"

  - id: tire
    level: 3
    titleZh: "轮胎"
    titleEn: "TIRE"
    bodyZh: |+
      ![轮胎](./assets/mazda-mx-5-cup/tire.png)

      #### 轮胎配方

      选择车辆载入赛道时安装的轮胎类型。干地光头胎用于干燥比赛条件，湿地胎则用于降雨和湿滑赛道条件。

    bodyEn: |+
      
      ![Image](./assets/mazda-mx-5-cup/tire.png)
      
      #### TIRE COMPOUND
      
      Selects which type of tire is installed on the car when loaded into the world. Dry, or slick, tires are used for dry racing conditions while Wet tires are intended for raining and wet track conditions.

  - id: front
    level: 3
    titleZh: "前部"
    titleEn: "FRONT"
    bodyZh: |+
      ![前部设置](./assets/mazda-mx-5-cup/front.png)

      #### 前束

      从上方观察时，前束角是车轮相对于底盘中心线的夹角。前束为负值时，轮胎前缘比后缘更远离中心线；前束为正值时，轮胎前缘比后缘更靠近中心线。负前束会降低车辆的直线稳定性，但可提高初始转向响应，代价是胎温和磨损增加。减小负前束（甚至采用正前束）会提高直线稳定性并降低胎温与磨损，但可能使车辆对转向输入的响应变得迟缓。

      #### 防倾杆

      前防倾杆提供三个设置，用于改变前悬架的侧倾刚度。较软的设置会降低前悬架侧倾刚度、减轻转向不足，但也会略微降低车头对快速转向输入的响应。较硬的设置会提高前悬架侧倾刚度，增加转向不足和转向响应。

      #### 对角配重

      车库中右前轮与左后轮载荷之和占车辆总重的百分比。对于非椭圆赛道，在其他底盘设置左右对称的前提下，50.0% 通常为最佳值，可使车辆在左右弯中呈现对称的操控特性。高于 50% 的对角配重会使车辆在左弯中更容易转向不足、在右弯中更容易转向过度。可通过调整各轮的弹簧座偏移来改变对角配重。调整对角配重时，务必成对调整弹簧座偏移（两个前轮、左后与右前、右后与左前，或全部四轮），避免大幅改变车高。车高变化本身会改变悬架动态，可能掩盖预期的对角配重调整效果或与之冲突。

    bodyEn: |+
      
      ![Image](./assets/mazda-mx-5-cup/front.png)
      
      #### TOE-IN
      
      Toe is the angle of the wheels relative to the chassis centerline when viewed from above. Negative toe-in sets the front of the tires farther from the centerline than the rear of the tires while positive toe-in sets the front of the tires closer to the centerline than the rear of the tires. Toe-out will destabilize the car in a straight line but this will increase turn-in response at the cost of increased tire temperature and wear. Reducing toe-out (and even running toe-in) will stabilize the car in a straight line and reduce temperature and wear, but could make the car sluggish in response to steering inputs.
      
      #### ANTI-ROLL BAR
      
      The front Anti-Roll Bar can be set to one of three settings to change the roll stiffness of the front suspension. Softer settings will reduce front suspension roll stiffness, reducing understeer but slightly reducing the front end’s responsiveness to quick steering inputs. Firmer settings will increase the front suspension roll stiffness, increasing understeer and steering response.
      
      #### CROSS WEIGHT
      
      The percentage of total vehicle weight in the garage acting across the right front and left rear corners. 50.0% is generally optimal for non-oval tracks as this will produce symmetrical handling in both left and right hand corners providing all other chassis settings are symmetrical. Higher than 50% cross weight will result in more understeer in left hand corners and increased oversteer in right hand corners, cross weight can be adjusted by making changes to the spring perch offsets at each corner of the car. When adjusting cross weight, be sure to adjust the perch offsets in pairs (both fronts, LR+RF or RR+LF, all four) to avoid dramatically altering the ride heights. Changing ride heights will alter the suspension dynamics on its own, which could mask or conflict with the desired crossweight adjustment.

  - id: front-corners
    level: 3
    titleZh: "前轮设置"
    titleEn: "FRONT CORNERS"
    bodyZh: |+
      ![前轮设置](./assets/mazda-mx-5-cup/front-corners.png)

      #### 冷态胎压

      车辆载入赛道时的轮胎气压。较高胎压可降低滚动阻力和热量积聚，但会减少抓地力；较低胎压会增加滚动阻力和热量积聚，但可提高抓地力。车速和负荷较高时需要更高胎压，车速和负荷较低时则通常使用较低胎压表现更好。为获得最佳性能，应根据赛道特性设置冷态胎压。一般建议从较低胎压开始，再按需逐步提高。

      #### 上次热态胎压

      车辆返回维修区后的轮胎气压。冷态与热态胎压之差可用于判断车辆在一个赛道驾驶阶段中的平衡变化；负荷较重的轮胎会产生更大的冷热胎压差。理想情况下，工作状态相近的轮胎应以相同速率增压，以免车辆的操控平衡随着轮胎使用时间而改变。因此，应调整冷态胎压，使同类轮胎达到工作温度后具有相近胎压。应在连续行驶若干圈、胎压趋于稳定后分析热态胎压。由于每次驾驶阶段的圈数会随赛道长度变化，可先在完整燃油驾驶里程或比赛距离约 50% 处进行分析，具体取更符合赛事情况的一项。

      #### 上次胎温 O M I（轮胎温度）

      车辆返回维修区后的轮胎胎体温度。单轮载荷和轮胎在赛道上的工作强度会反映在胎温中，可利用这些数值分析车辆的操控平衡。中央温度适合直接比较各条轮胎的工作强度；内侧与外侧温度则可用于分析车辆在赛道上的车轮定位状态，主要是外倾角。这些数值分别在胎面外侧、中部和内侧三个区域测量。

      #### 剩余胎面厚度

      车辆返回维修区后轮胎的剩余胎面厚度。轮胎磨损非常有助于识别车轮定位方面的潜在问题，例如轮胎一侧过度磨损；还可结合胎温分析车辆的操控平衡。其测量区域与胎温相同。

      #### 单轮载荷

      车辆在车库中静止时，各车轮承受的载荷。合理分配各轮载荷，对于针对特定赛道和条件优化车辆至关重要。单轮载荷和对角配重均通过各轮的弹簧座偏移进行调整。

      #### 前车高

      地面到前轮后方底盘参考点的距离。由于数值是相对于车辆上的特定参考点测量，因此未必代表车辆的实际离地间隙，但可作为车辆静止时距赛道表面高度的可靠基准。调整车高是获得最佳性能的关键，因为车高会直接影响车辆过弯时的机械抓地力与响应。提高前车高会允许过弯时前轴发生更多横向载荷转移，通常可减轻转向不足，但有时会降低车头响应。相反，降低前车高会减少前轴横向载荷转移，可能导致转向不足，但通常能为车手提供更灵敏的响应感受。

      #### 弹簧座偏移

      通过改变弹簧的静态预载来调整车辆该轮的车高。增大弹簧座偏移会降低该轮车高并减少单轮载荷；减小弹簧座偏移则会抬高该轮车高并增加单轮载荷，同时也会影响其余三个车轮的载荷。此类调整应在同一车轴左右对称进行，以确保左右车高一致且不改变对角配重。也可成对角线调整弹簧座偏移（左前与右后、右前与左后），以改变车辆的静态对角配重。

      #### 压缩阻尼

      压缩阻尼设置会同时调整减振器的低速与高速压缩阻尼特性。对于 MX-5，“0”是最小阻尼设置（压缩阻力最小），“+11”是最大阻尼设置（压缩阻力最大）。提高压缩阻尼会使制动、变向等瞬态动作中的载荷更快传递至车轮，通常可提高初始转向响应，但会降低整体抓地力。高速压缩阻尼会随低速压缩阻尼同步增加，因此车辆碾过路肩时的冲击响应也会更生硬。在较平整的赛道上，较高压缩阻尼通常有利于性能；在较颠簸或路肩激进的赛道上，降低压缩阻尼则可牺牲部分平台控制来换取更高的机械抓地力。

      #### 回弹阻尼

      回弹阻尼设置会同时调整减振器的低速与高速回弹阻尼特性。提高回弹阻尼会减慢减振器在低速和高速工况下的伸长速度。典型的低减振器速度工况是车辆在出弯时由侧倾状态恢复水平；高速工况则是悬架在大幅碾过路肩后伸长。“0”是最小阻尼设置（伸长阻力最小），“+11”是最大阻尼设置（伸长阻力最大）。较高的回弹刚度可改善底盘响应，但应避免减振器回弹过慢（设置过高），否则轮胎可能完全失去与赛道表面的接触，引发或加剧严重振荡。

      #### 外倾角

      外倾角是车轮相对于底盘中心的垂直夹角。车轮顶部比底部更靠近底盘中心线称为负外倾，轮胎顶部比底部更向外则称为正外倾。受悬架几何和过弯负荷影响，四个车轮通常都需要负外倾。增大负外倾角的绝对值可提高轮胎产生的横向力，但会降低制动时的纵向抓地力。外倾角过大虽然可能产生很强的过弯力，也会显著缩短轮胎寿命，因此需要在耐久性与性能之间取得平衡。增加前轮负外倾通常会增强中高速过弯时的前轴抓地力，但会损失制动性能，因此需要将制动力分配相应后移作为补偿。

    bodyEn: |+
      
      ![Image](./assets/mazda-mx-5-cup/front-corners.png)
      
      #### COLD AIR PRESSURE
      
      Air pressure in the tire when the car is loaded into the world. Higher pressures will reduce rolling drag and heat buildup, but will decrease grip. Lower pressures will increase rolling drag and heat buildup, but will increase grip. Higher speeds and loads require higher pressures, while lower speeds and loads will see better performance from lower pressures. Cold pressures should be set to track characteristics for optimum performance. Generally speaking, it is advisable to start at lower pressures and work your way upwards as required.
      
      #### LAST HOT PRESSURE
      
      Air pressure in the tire after the car has returned to the pits. The difference between cold and hot pressures can be used to identify how the car is progressing through a run in terms of balance, with heavier-loaded tires seeing a larger difference between cold and hot pressures. Ideally, tires that are worked in a similar way should build pressure at the same rate to prevent a change in handling balance over the life of the tire, so cold pressures should be adjusted to ensure that similar tires are at similar pressures once up to operating temperature. Hot pressures should be analyzed once the tires have stabilized after a period of laps. As the number of laps per run will vary depending upon track length a good starting point is approximately 50% of a full fuel run or race length, whichever is more appropriate for the event.
      
      #### LAST TEMPS O M I (TIRE TEMPERATURES)
      
      Tire carcass temperatures once the car has returned to the pits. Wheel Loads and the amount of work a tire is doing on-track are reflected in the tire’s temperature, and these values can be used to analyze the car’s handling balance. Center temperatures are useful for directly comparing the work done by each tire, while the Inner and Outer temperatures are useful for analyzing the wheel alignment (predominantly camber) while on track. These values are measured in three zones across the tread of the tire. Inside, Middle and Outer.
      
      #### TREAD REMAINING
      
      The amount of tread remaining on the tire once the car has returned to the pits. Tire wear is very helpful in identifying any possible issues with alignment, such as one side of the tire wearing excessively, and can be used in conjunction with tire temperatures to analyze the car’s handling balance. These values are measured in the same zones as those of temperature.
      
      #### CORNER WEIGHT
      
      The weight underneath each tire under static conditions in the garage. Correct weight placement around the car is crucial for optimizing a car for a given track and conditions. Individual wheel weight adjustments and crossweight adjustments are made via the spring perch offset adjustments at each corner.
      
      #### FRONT RIDE HEIGHT
      
      Distance from ground to a reference point on the chassis just behind the front wheels. Since these values are measured to a specific reference point on the car, these values may not necessarily reflect the vehicle’s ground clearance, but instead provide a reliable value for the height of the car off of the race track at static values. Adjusting Ride Heights is key for optimum performance, as they can directly influence the vehicle’s mechanical grip when cornering and responsiveness. Increasing front ride height will allow for more weight transfer across the front axle when cornering, usually reducing understeer but sometimes reducing front-end responsiveness. Conversely, reducing ride height will reduce the weight transfer across the front axle, which can induce understeer but usually provides a more responsive feel to the driver.
      
      #### SPRING PERCH OFFSET
      
      Used to adjust the ride height at the corner of the car by changing the static preload on the spring. Increasing the spring perch offset will result in lowering the corner of the car and reducing the corner weight, while reducing the spring perch offset will raise the corner of the car and increase the corner weight (along with changes to the other three corner weights). These changes should be kept symmetrical across the axle (left to right) to ensure the same corner ride heights and no change in cross weight. The spring perch offsets can also be used in diagonal pairs (LF to RR and RF to LR) to change the static cross weight in the car.
      
      #### COMPRESSION DAMPING
      
      The compression damping setting is a paired adjustment controlling both the low and high speed damping characteristics of the damper. For the MX-5, “0” is the minimum damping setting (least resistance to compression) while “+11” is maximum damping (most resistance to compression). Increasing the compression damping will result in a faster transfer of weight to the wheel during transient movements such as braking and direction change with increased damping usually providing an increase in turn-in response but a reduction in overall grip. High speed compression damping will increase proportionally to the increase in low speed compression damping which will also result in harsher response to kerb strikes. At smoother tracks more compression damping will typically increase performance while at rougher tracks or ones with aggressive kerbs less compression damping can result in an increase in mechanical grip at the expense of platform control.
      
      #### REBOUND DAMPING
      
      The Rebound damping setting is a paired adjustment to both low and high speed rebound damping characteristics. Increasing rebound damping will slow down the rate at which the damper extends in both low and high speed situations. A typical low damper speed situation would be as the car rolls back to level on a corner exit while a high speed situation would be where the suspension is extending after large kerb contact. Setting “0” is minimum damping (least resistance to extension) while “+11” is maximum damping (most resistance to extension). While high rebound stiffness will result in improved chassis response it is important to avoid situations where the shock is too slow in rebound (set too high) as this will result in the tire losing complete contact with the track surface which can induce or exacerbate severe oscillations.
      
      #### CAMBER
      
      Camber is the vertical angle of the wheel relative to the center of the chassis. Negative camber is when the top of the wheel is closer to the chassis centerline than the bottom of the wheel, positive camber is when the top of the tire is farther out than the bottom. Due to suspension geometry and corner loads, negative camber is desired on all four wheels. Higher negative camber values will increase the cornering force generated by the tire, but will reduce the amount of longitudinal grip the tire will have under braking. Excessive camber values can produce very high cornering forces but will also significantly reduce tire life, so it is important to find a balance between life and performance. Increasing front camber values will typically result in increased front axle grip during mid to high speed cornering but will result in a loss of braking performance and necessitate a rearward shift in brake bias to compensate.

  - id: left-right-rear
    level: 3
    titleZh: "左／右后轮"
    titleEn: "LEFT / RIGHT REAR"
    bodyZh: |+
      ![左／右后轮设置](./assets/mazda-mx-5-cup/left-right-rear.png)

      #### 后车高

      地面到后轮前方底盘后部参考点的距离。提高后车高会允许过弯时后轴发生更多横向载荷转移，通常会增加转向过度。相反，降低后车高会减少后轴横向载荷转移，通常会增加转向不足。

      #### 压缩阻尼

      压缩阻尼设置会同时调整减振器的低速与高速压缩阻尼特性，调节范围与前减振器相同。提高压缩阻尼会使加速、变向等瞬态动作中的载荷更快传递至车轮，通常可提高响应，但会降低整体抓地力。在颠簸赛道上，压缩阻尼过硬可能导致轮胎负荷大幅波动并降低整体抓地力，从而严重损害牵引力。

      #### 回弹阻尼

      回弹阻尼设置会同时调整减振器的低速与高速回弹阻尼特性，调节范围与前减振器相同。提高回弹阻尼会减慢减振器在低速和高速工况下的伸长速度。与前轴相同，较高的回弹刚度可改善平台控制和底盘整体响应，但应避免减振器回弹过慢（设置过高），否则轮胎可能完全失去与赛道表面的接触。此问题在制动和初始入弯阶段尤其不利；不过，提高回弹刚度也能在施加制动时“减缓”车辆俯仰姿态的变化，从而可能改善制动稳定性。

      #### 外倾角

      外倾角是车轮相对于底盘中心的垂直夹角。车轮顶部比底部更靠近底盘中心线称为负外倾，轮胎顶部比底部更向外则称为正外倾。受悬架几何和过弯负荷影响，四个车轮通常都需要负外倾。与前轮相似，为提高横向抓地能力，后轮也适合采用较大的负外倾角；不过，后轮负外倾通常会略小于前轮。这主要是因为后轮还负责驱动车辆前进，因此外倾角对横向抓地力的增益需要与纵向牵引力的损失进行权衡。

    bodyEn: |+
      
      ![Image](./assets/mazda-mx-5-cup/left-right-rear.png)
      
      #### REAR RIDE HEIGHT
      
      Distance from ground to a reference point on the rear of the chassis just in front of the rear wheels. Increasing rear ride height will allow for more weight transfer across the rear axle when cornering, typically inducing oversteer. Conversely, reducing ride height will reduce weight transfer across the rear axle, typically inducing understeer.
      
      #### COMPRESSION DAMPING
      
      The compression damping setting is a paired adjustment controlling both the low and high speed damping characteristics of the damper with identical ranges to those of the front dampers. Increasing the compression damping will result in a faster transfer of weight to the wheel during transient movements such as accelerating and direction change with increased damping usually providing an increase in response but a reduction in overall grip. Excessively stiff compression damping can cause very poor traction on rough tracks as it can result in large tire load variation and a reduction in overall grip.
      
      #### REBOUND DAMPING
      
      The rebound damping setting is a paired adjustment controlling both the low and high speed damping characteristics of the damper with identical ranges to those of the front dampers. Increasing rebound damping will slow down the rate at which the damper extends in both low and high speed situations. As at the front, high rebound stiffness will result in improved platform control and better overall chassis response but it is important to avoid situations where the shock is too slow in rebound (set too high) as this will result in the tire losing complete contact with the track surface. This can be particularly detrimental during braking events and during the initial turn-in phase, though an increase in rebound stiffness can help to ‘slow down’ the change in pitch of the car as the brakes are applied, potentially increasing braking stability.
      
      #### CAMBER
      
      Camber is the vertical angle of the wheel relative to the center of the chassis. Negative camber is when the top of the wheel is closer to the chassis centerline than the bottom of the wheel, positive camber is when the top of the tire is farther out than the bottom. Due to suspension geometry and corner loads, negative camber is desired on all four wheels. Similar to the front of the car it is desirable to run significant amounts of negative camber in order to increase the lateral grip capability; however it is typical to run slightly reduced rear camber relative to the front. This is primarily because rear tires must also perform the duty of driving the car forwards where benefits of camber to lateral grip become a tradeoff against reduced longitudinal (traction) performance.

  - id: rear
    level: 3
    titleZh: "后部"
    titleEn: "REAR"
    bodyZh: |+
      ![后部设置](./assets/mazda-mx-5-cup/rear.png)

      #### 燃油量

      油箱内的燃油量。

      #### 前束

      从上方观察时，前束角是车轮相对于底盘中心线的夹角。车轮前缘比后缘更靠近中心线称为正前束，反之则称为负前束。后轴通常采用正前束。增加正前束可改善直线稳定性，但会降低变向响应。应尽量避免使用过大的正前束，否则会增加滚动阻力、降低直线速度。

      #### 防倾杆

      后防倾杆有两种设置：“OEM”和“断开”。选择“OEM”时，原厂后防倾杆保持连接，会提高后悬架刚度并增加过弯时的转向过度。选择“断开”时，后防倾杆脱开，后轴侧倾刚度会大幅降低，从而增加转向不足。

    bodyEn: |+
      
      ![Image](./assets/mazda-mx-5-cup/rear.png)
      
      #### FUEL LEVEL
      
      The amount of fuel in the fuel tank.
      
      #### TOE-IN
      
      Toe is the angle of the wheels, when viewed from above, relative to the centerline of the chassis. Toe-in is when the front of the wheels are closer to the centerline than the rear of the wheels, and Toe-out is the opposite. At the rear of the car it is typical to run toe-in. Increases in toe-in will result in improved straight line stability and a reduction in response during direction changes. Large values of toe-in should be avoided if possible as this will increase rolling drag and reduce straight line speeds.
      
      #### ANTI-ROLL BAR
      
      The rear Anti-Roll Bar can be run one of two ways: “OEM” and “Unhooked”. When “OEM” is selected, the stock rear Anti-Roll Bar is attached, increasing rear suspension stiffness and inducing oversteer while cornering. When “Unhooked” is selected, the rear Anti-Roll Bar is detached, dramatically reducing rear roll stiffness, which will induce understeer.
