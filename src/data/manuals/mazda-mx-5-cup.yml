  - id: introduction
    level: 2
    titleEn: "INTRODUCTION"
    bodyEn: |+
      
      The information found in this guide is intended to provide a deeper understanding of the chassis setup adjustments available in the garage, so that you may use the garage to tune the chassis setup to your preference.
      
      Before diving into chassis adjustments, though, it is best to become familiar with the car and track. To that end, we have provided baseline setups for each track commonly raced by these cars. To access the baseline setups, simply open the Garage, click iRacing Setups, and select the appropriate setup for your track of choice. If you are driving a track for which a dedicated baseline setup is not included, you may select a setup for a similar track to use as your baseline. After you have selected an appropriate setup, get on track and focus on making smooth and consistent laps, identifying the proper racing line and experiencing tire wear and handling trends over a number of laps.
      
      Once you are confident that you are nearing your driving potential with the included baseline setups, read on to begin tuning the car to your handling preferences.

  - id: getting-started
    level: 3
    titleEn: "GETTING STARTED"
    bodyEn: |+
      
      ![Image](./assets/mazda-mx-5-cup/getting-started.png)
      
      The Mazda MX-5 requires the clutch to be depressed prior to engaging the engine starter for safety reasons. If you are using the Manual Clutch setting, be sure to have the clutch fully depressed when starting the car or the starter will not turn on. If you are using Auto Clutch or a shifting aid, you can start the engine like any other car.
      
      Once the engine is started, leaving the pits is as easy as selecting the “upshift” button to put it into gear, and hitting the accelerator pedal while slowly releasing the clutch if using Manual Clutch.
      
      This car uses a sequential transmission and does not require a clutch input to shift in either direction. However the car’s downshift protection will not allow you to downshift if it feels you are traveling too fast for the gear selected and would incur engine damage. If that is the case, the gear change command will simply be ignored.
      
      Upshifting is recommended when the shift lights on the dashboard are flashing. This occurs at 7400 RPM, the rev limiter kicks in at 7500 RPM.

  - id: loading-an-iracing-setup
    level: 3
    titleEn: "LOADING AN iRACING SETUP"
    bodyEn: |+
      
      ![Image](./assets/mazda-mx-5-cup/loading-iracing-setup.png)
      
      Upon loading into a session, the car will automatically load the iRacing Baseline setup `<baseline.sto>`. If you would prefer one of iRacing’s pre-built setups that suit various conditions, you may load it by clicking Garage &gt; iRacing Setups &gt; and then selecting the setup to suit your needs.
      
      If you would like to customize the setup, simply make the changes in the garage that you would like to update and click apply. If you would like to save your setup for future use click “Save As” on the right to name and save the changes.
      
      To access all of your personally saved setups, click “My Setups” on the right side of the garage.
      
      If you would like to share a setup with another driver or everyone in a session, you can select “Share” on the right side of the garage to do so.
      
      If a driver is trying to share a setup with you, you will find it under “Shared Setups” on the right side of the garage as well.

  - id: dash-configuration
    level: 2
    titleEn: "DASH CONFIGURATION"
    bodyEn: |+
      
      The dash display in this car is non-adjustable and features a single page to display critical vehicle information.
      
      ![Image](./assets/mazda-mx-5-cup/dash-configuration.png)
      
      Six numbered status indicator lights are featured in the top left and top right of the dash within the outer frame. Each light displays a different condition, with the light’s color representing a different level of each condition:
      
      1. Engine Warning - Will illuminate in red if a serious engine problem is present, usually paired with a message on the main display.
      2. Water Temperature - Flashes blue whenever the engine cooling water is overheated
      3. Fuel Level - Displays fuel level in three stages based on percent of a full tank:
          - Green: More than 25% of fuel level remaining
          - Yellow: Less than 25%, but more than 15% remaining
          - Red (Flashing): Less than 15% remaining
      4. Inoperable
      5. Inoperable
      6. Pit Limiter - Flashes yellow when pit speed limiter is on. NOTE: Pit speed limiter is only available in 1st gear.
      
      The Global MX-5 is equipped with an AiM MXL2 Digital Dash to show the driver all vital information in an easy-to-read display.
      
      - RPM Band - Displays engine RPM by filling-in segments around the top of the display. Every line is 1000 RPM.
      - Speed - Vehicle speed is shown in the center of the display just underneath the “7” on the RPM Band.
      - Gear - The currently selected gear is on the right of the RPM band
      - H2OT - Water Temperature in the engine cooling system
      - GPS: Good - GPS Connection status
      - Lap - Displays the number of laps completed. This does not reset to zero when returning to the garage.
      - Lap Time - The previously completed lap time is displayed in the center bottom of the display.
      - Engine Warning Box - Should a serious issue develop with the engine, a boxed message will appear on the right side of the display.

