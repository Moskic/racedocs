sections:
  - id: preamble
    level: 2
    bodyZh: |+
      ![图片](./assets/audi-r8-lms-evo-ii-gt3/welcome-hero.png)
      
      #### 亲爱的 iRACING 用户：
      
      恭喜您购入 Audi R8 LMS EVO II GT3！iRacing 全体团队感谢您的支持与对我们产品的认可。我们致力于提供极致的模拟赛车体验，也希望您驾驶这辆新赛车时，能在赛道上收获无限激情！
      
      本指南将介绍如何充分发挥这辆新赛车的性能，包括如何在离开赛道后调整车辆设定，以及驾驶时会在座舱内看到哪些信息。希望本指南能帮助您尽快熟悉赛车、提升圈速。
      
      再次感谢您的购买，赛道上见！
      
      ![图片](./assets/audi-r8-lms-evo-ii-gt3/welcome-car.png)
    bodyEn: |+
      ![Image](./assets/audi-r8-lms-evo-ii-gt3/welcome-hero.png)
      
      #### DEAR iRACING USER,
      
      Congratulations on your purchase of the Audi R8 LMS EVO II GT3! From all of us at iRacing, we appreciate your support and your commitment to our product. We aim to deliver the ultimate sim racing experience, and we hope that you’ll find plenty of excitement with us behind the wheel of your new car!
      
      The following guide explains how to get the most out of your new car, from how to adjust its settings off of the track to what you’ll see inside of the cockpit while driving. We hope that you’ll find it useful in getting up to speed.
      
      Thanks again for your purchase, and we’ll see you on the track!
      
      ![Image](./assets/audi-r8-lms-evo-ii-gt3/welcome-car.png)

