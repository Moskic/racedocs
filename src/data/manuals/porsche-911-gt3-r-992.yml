sections:
  - id: preamble
    level: 2
    bodyZh: |+
      ![欢迎页面](./assets/porsche-911-gt3-r-992/welcome-hero.png)

      #### 亲爱的 iRacing 用户：

      Porsche 911 GT3 R 992 规格版本是 Porsche 悠久 911 跑车赛事谱系中的最新车型，接替了于 2019 赛季首次参赛、基于 991 打造的 GT3 R。它与 2021 年首次亮相的现款 Porsche 911 GT3 Cup 一样，都是基于 992 代车型开发的 Porsche 赛车。在其首次参加 IMSA WeatherTech 跑车锦标赛的赛季中，Pfaff Motorsports、MDK Motorsports、Wright Motorsports、AO Racing Team 以及 Kelly-Moss with Riley 五支车队，均至少派出一辆 992 参加 GTD 或 GTD Pro 组别。

      911 GT3 R (992) 搭载 4.2 升 Porsche 水平对置六缸发动机，相比前代车型的 4.0 升动力单元排量有所提升。2023 年赛百灵 12 小时耐力赛中，Klaus Bachler、Patrick Pilet 与 Laurens Vanthoor 组成的 Pfaff GTD Pro 车组为它赢得 IMSA 首胜；一个月后，Bachler 与 Pilet 又在长滩街道赛取得季军。Kelly-Moss with Riley 车队的 Alec Udell、Julien Andlauer 与 David Brule 也在赛百灵为该车拿下首个 GTD 组别领奖台。本指南将说明如何充分发挥新车的性能，涵盖从赛道外的车辆设置调整，到驾驶时在座舱内看到的各种信息。希望本指南能帮助您快速上手。

      再次感谢您的购买，我们赛道上见！

      ![Porsche 911 GT3 R (992) 赛车](./assets/porsche-911-gt3-r-992/welcome-car.png)

    bodyEn: |+
      ![Image](./assets/porsche-911-gt3-r-992/welcome-hero.png)
      
      #### DEAR iRACING USER,
      
      The latest in a long line of Porsche 911s built for sports car racing, the 992-spec edition of the Porsche 911 GT3 R follows in the footsteps of the 991-based GT3 R that debuted for the 2019 racing season. It also joins the current model of the Porsche 911 GT3 Cup car, which debuted in 2021, as a racing Porsche based on the 992 generation. In its inaugural IMSA WeatherTech SportsCar Championship season, five teams—Pfaff Motorsports, MDK Motorsports, Wright Motorsports, AO Racing Team, and Kelly-Moss with Riley—have all brought at least one 992 to the grid across the GTD and GTD Pro divisions.
      
      The 911 GT3 R (992) is powered by a 4.2-liter Porsche flat-six engine, a step up in displacement from the 4.0-liter units in the previous car. Its first IMSA win came at the hands of Pfaff’s GTD Pro squad of Klaus Bachler, Patrick Pilet, and Laurens Vanthoor in the 2023 12 Hours of Sebring, and the duo of Bachler and Pilet backed it up the next month with a third place finish on the streets of Long Beach. Kelly-Moss with Riley took the car’s first GTD podium at Sebring as well with Alec Udell, Julien Andlauer, and David Brule. The following guide explains how to get the most out of your new car, from how to adjust its settings off of the track to what you’ll see inside of the cockpit while driving. We hope that you’ll find it useful in getting up to speed.
      
      Thanks again for your purchase, and we’ll see you on the track!
      
      ![Image](./assets/porsche-911-gt3-r-992/welcome-car.png)

