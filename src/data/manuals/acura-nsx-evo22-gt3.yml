  - id: pit-speed-limiter
    level: 3
    titleZh: "维修区限速器"
    titleEn: "PIT SPEED LIMITER"
    bodyZh: |+
      ![维修区限速器页面](./assets/acura-nsx-evo22-gt3/pit-speed-limiter.png)

      启用维修区限速器后，显示屏会切换为仅显示维修区道路和进站所需信息的布局。

      | Layout | 说明 |
      | --- | --- |
      | Pit Speed Lights | 启用维修区限速器后，所有换挡提示灯会以相同颜色亮起。车速低于维修区限速时，全部 LED 显示绿色；车速超过限速时，全部显示品红色。 |
      | Pit Time Bar | 进站作业开始后，由左向右推进的图形进度条 |
      | Gear | 当前选择的变速箱挡位 |
      | Pit Time | 显示进站期间已经过的时间。进站完成后，该时间会继续保留在屏幕上，直至关闭限速器 |
      | Speed | 车辆速度，单位为 km/h 或 mph |
      | Brake Bias | 当前制动力分配设置 |

    bodyEn: |+
      ![Image](./assets/acura-nsx-evo22-gt3/pit-speed-limiter.png)

      When the Pit Limiter is active, the display will change to a layout that displays only information relevant to pit road and the pit stop.

      | Layout | Description |
      | --- | --- |
      | Pit Speed Lights | When the Pit Limiter is active the shift lights will all illuminate in the same color. If the vehicle is traveling below the pit road speed limit, all LEDs will be green. If the speed is over the pit road speed limit, all lights will be magenta. |
      | Pit Time Bar | Graphical bar that progresses from left to right when the pit stop begins |
      | Gear | Currently selected transmission gear |
      | Pit Time | Displays how much time passed during the pit stop. Once the stop is completed this time will stay on the display until the limiter is deactivated |
      | Speed | Vehicle speed in kph or mph |
      | Brake Bias | Current Brake Bias setting |

  - id: shift-lights
    level: 3
    titleZh: "换挡提示灯"
    titleEn: "SHIFT LIGHTS"
    bodyZh: |+
      ![换挡提示灯](./assets/acura-nsx-evo22-gt3/shift-lights.png)

      数字显示屏上方设有一排 10 颗换挡 LED。随着发动机转速升高，LED 会从左向右依次亮起。建议在全部 10 颗 LED 变为红色时升挡。

      需要特别注意的是，转速条大约会在 LED 变红的同时变为红色；但转速条并非换挡指示器，它只会在发动机接近转速限制器时变红。

    bodyEn: |+
      ![Image](./assets/acura-nsx-evo22-gt3/shift-lights.png)

      A row of 10 shift LEDs sit above the digital display, illuminating from left to right as engine RPM increases. Shifting is recommended when all 10 LEDs have changed to red.

      It’s important to note that the RPM bar will change to red around the same time the LEDs switch to red, however the RPM bar is not a shift indicator and only turns red when approaching the rev limiter.

  - id: wheel-lock-indicators
    level: 3
    titleZh: "车轮抱死指示灯"
    titleEn: "WHEEL LOCK INDICATORS"
    bodyZh: |+
      ![车轮抱死指示灯](./assets/acura-nsx-evo22-gt3/wheel-lock-indicators.png)

      显示屏两侧各有一组 LED，用于指示制动或车辆打转时发生抱死的车轮。品红色 LED 代表前轮，蓝色 LED 代表后轮。轻微抱死时，前轮仅点亮上方 LED，后轮仅点亮下方 LED；严重抱死时，两颗 LED 会同时亮起。

      ---

      <!-- section-divider page=10 -->

    bodyEn: |+
      ![Image](./assets/acura-nsx-evo22-gt3/wheel-lock-indicators.png)

      A set of LEDs on either side of the display illuminate to identify wheel lockups under braking or during a spin. Magenta LEDs represent the front wheels, blue LEDs represent the rear wheels. For minor lockups only the upper LED for the fronts and lower LED for the rear will illuminate, while major lockups will be indicated with both LEDs.

      ---

