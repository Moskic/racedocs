    bodyEn: |+
      ![Image](./assets/acura-nsx-evo22-gt3/rear-dampers.png)

      #### LOW SPEED COMPRESSION

      Low speed compression affects how resistant the shock is to compression (reduction in length) when the shock is moving at relatively low speeds, usually in chassis movements as a result of driver input (steering, braking, & throttle) and cornering forces. In this case 1 is minimum damping (least resistance to compression) while 16 is maximum damping (most resistance to compression). Increasing the low speed compression damping will result in a faster transfer of weight to this corner of the car during transient movements such as braking and direction change with increased damping usually increasing the cars tendency to understeer on throttle application.

      #### HIGH SPEED COMPRESSION

      High speed compression affects the shock’s behavior in high speed travel, usually attributed to curb strikes and bumps in the track’s surface. Higher compression values will cause the suspension to be stiffer in these situations, while lower values will allow the suspension to absorb these bumps better but may hurt the aerodynamic platform around the track. At smoother tracks more high speed compression damping will typically increase performance while at rougher tracks or ones with aggressive kerbs less high speed compression damping can result in an increase in mechanical grip at the expense of platform control. Setting 16 is maximum damping while 1 is minimum damping.

      #### LOW SPEED REBOUND

      Low speed rebound damping controls the stiffness of the shock while extending at lower speeds, typically during body movement as a result of driver inputs. Higher rebound values will resist expansion of the shock, lower values will allow the shock to extend faster. As at the front, high rebound stiffness will result in improved platform control for aerodynamic performance and overall chassis response but it is important to avoid situations where the shock is too slow in rebounding as this can result in the tire losing complete contact with the track surface. Provided this is avoided,, an increase in rebound stiffness can help to ‘slow down’ the change in pitch of the car as the brakes are applied, increasing braking stability and off-throttle mechanical understeer. Setting 16 is maximum damping (most resistant to extension) while 1 is minimum damping (least resistance to extension).

      #### HIGH SPEED REBOUND

      High-speed rebound adjusts the shock in extension over bumps and curb strikes. Higher values will reduce how quickly the shock will expand, while lower values will allow the shock to extend more easily. Despite not having as much of an effect on handling in result to driver inputs, High-speed rebound can produce similar results in terms of aerodynamic control and uncontrolled oscillations if set improperly. Setting 16 is maximum damping while 1 is minimum damping.

