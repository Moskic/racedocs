  - id: advanced-setup-options
    level: 2
    titleZh: "高级设置选项"
    titleEn: "ADVANCED SETUP OPTIONS"
    bodyZh: |+
      > 本节面向希望深入了解车辆各项设置的进阶用户。调整以下参数并非必要操作，而且可能显著改变车辆的操控特性。建议所有调整都采用小幅渐进的方式，每次仅更改一个变量，然后上赛道测试效果。

