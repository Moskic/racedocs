  - id: race
    level: 3
    titleZh: "比赛"
    titleEn: "RACE"
    bodyZh: |+
      ![比赛仪表页面](./assets/acura-nsx-evo22-gt3/dash-race.png)

      | Layout | 说明 |
      | --- | --- |
      | Tachometer | 显示屏顶部的条形图显示当前发动机转速 |
      | Tire Pressures | 显示屏左上角显示四条轮胎各自的实时胎压 |
      | Remain | 油箱内的剩余燃油量，单位为升或加仑 |
      | Lap | 上一圈的燃油消耗量，单位为升或加仑 |
      | Gear Indicator | 当前选择的变速箱挡位 |
      | Brake Temp Indicators | 挡位指示周围的四个方块分别显示四个制动盘的温度。制动器温度过低时显示为蓝色，处于最佳温度范围时显示为黑色，过热时显示为红色。 |
      | TCS | 牵引力控制系统设置；系统关闭时变为红色 |
      | ABS | 防抱死制动系统设置；系统关闭时变为红色 |
      | Speed | 车辆速度，单位为 km/h 或 mph |
      | Predicted Lap Time | 当前圈的预计圈速 |
      | Lap Gain / Loss | 当前圈相对于本次会话最佳圈的实时圈速差 |
      | TC Cut | 以图形显示牵引力控制系统为抑制车轮空转而进行断火干预的程度 |

    bodyEn: |+
      ![Image](./assets/acura-nsx-evo22-gt3/dash-race.png)

      | Layout | Description |
      | --- | --- |
      | Tachometer | The bar across the top of the display shows the current engine RPM |
      | Tire Pressures | Live Tire Pressures are shown in the upper left of the display, one for each tire |
      | Remain | Volume of fuel in the fuel tank, in Liters or Gallons |
      | Lap | Volume of fuel used on the previous lap, in Liters or Gallons |
      | Gear Indicator | Currently selected transmission gear |
      | Brake Temp Indicators | Four squares around the Gear Indicator will display the temperature for the four brake rotors. If the brakes are too cold they will appear in blue, the squares will be black if the brakes are in the optimum temperature range, and if the brakes are overheated they will be red. |
      | TCS | Traction Control System setting, changes to red when the system is OFF |
      | ABS | Anti-Lock Brake System setting, changes to red when the system is OFF |
      | Speed | Vehicle speed in kph or mph |
      | Predicted Lap Time | Estimated time for the current lap |
      | Lap Gain / Loss | Current lap time delta relative to the session-best lap |
      | TC Cut | Graphical display of how much the traction control system is cutting the ignition to control wheelspin. |

