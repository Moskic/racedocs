sections:
  - id: preamble
    level: 2
    bodyZh: |+
      ![欢迎页面](./assets/acura-nsx-evo22-gt3/welcome-hero.png)

      #### 亲爱的 iRacing 用户：

      恭喜您购买 ACURA NSX GT3 EVO！iRacing 全体成员感谢您的支持以及对我们产品的认可。我们致力于提供极致的模拟赛车体验，也希望您驾驶新车时能在赛道上尽享激情！

      本指南将说明如何充分发挥新车的性能，涵盖从赛道外的车辆设置调整，到驾驶时在座舱内看到的各种信息。希望本指南能帮助您快速上手。

      再次感谢您的购买，我们赛道上见！

      ![Acura NSX GT3 EVO 赛车](./assets/acura-nsx-evo22-gt3/welcome-car.png)

    bodyEn: |+
      ![Image](./assets/acura-nsx-evo22-gt3/welcome-hero.png)

      #### DEAR iRACING USER,

      Congratulations on your purchase of the ACURA NSX GT3 EVO! From all of us at iRacing, we appreciate your support and your commitment to our product. We aim to deliver the ultimate sim racing experience, and we hope that you’ll find plenty of excitement with us behind the wheel of your new car!

      The following guide explains how to get the most out of your new car, from how to adjust its settings off of the track to what you’ll see inside of the cockpit while driving. We hope that you’ll find it useful in getting up to speed.

      Thanks again for your purchase, and we’ll see you on the track!

      ![Image](./assets/acura-nsx-evo22-gt3/welcome-car.png)

