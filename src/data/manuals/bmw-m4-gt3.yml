sections:
  - id: preamble
    level: 2
    bodyZh: |+
      ![欢迎页面](./assets/bmw-m4-gt3/welcome-hero.png)

      #### 亲爱的 iRacing 用户：

      恭喜您购买 BMW M4 GT3！iRacing 全体成员感谢您的支持以及对我们产品的认可。我们致力于提供极致的模拟赛车体验，也希望您驾驶新车时能在赛道上尽享激情！随着 BMW M4 GT3 提前发布，iRacing 再次强化了对 GT3 内容的投入；这款赛车将于 2021 年首次参加现实世界的比赛。新车于 12 月初的 BMW Sim Live 活动正式亮相，未来几年将在全球各地的 GT3 系列赛中征战，同时也会加入 iRacing 对应的官方系列赛和特别赛事。

      当前 BMW M4 GT3 是预发布版本，将在 2021 第 1 赛季版本更新后的数周内向 iRacing 会员开放。它接替 BMW Z4 GT3，成为 iRacing GT3 车型阵容中的第二款 BMW 赛车。在接下来的几个月里，这款仍在开发中的赛车将通过一系列全面更新，与现实中的最终版本保持一致，之后面向所有会员移除 Beta 标识。本指南将说明如何充分发挥新车的性能，涵盖从赛道外的车辆设置调整，到驾驶时在座舱内看到的各种信息。希望本指南能帮助您快速上手。

      再次感谢您的购买，我们赛道上见！

      ![BMW M4 GT3 赛车](./assets/bmw-m4-gt3/welcome-car.png)

    bodyEn: |+
      ![Image](./assets/bmw-m4-gt3/welcome-hero.png)
      
      #### DEAR iRACING USER,
      
      Congratulations on your purchase of the BMW M4 GT3! From all of us at iRacing, we appreciate your support and your commitment to our product. We aim to deliver the ultimate sim racing experience, and we hope that you’ll find plenty of excitement with us behind the wheel of your new car! iRacing’s renewed focus on GT3 content continues with an early release of the BMW M4 GT3 that will make its real-world racing debut in 2021. Revealed at BMW Sim Live in early December, the new car will compete in GT3 series around the world in the coming years, and will also run in iRacing’s corresponding official series and special events.
      
      The BMW M4 GT3 is a pre-release version of the BMW M4 GT3 that will be made available to iRacing members in the weeks after the 2021 Season 1 build. The car succeeds the BMW Z4 GT3 as the second BMW to join iRacing’s GT3 offerings. In the coming months, the in-development car will shed the Beta label for all members, receiving a comprehensive set of updates to match its final real-world form. The following guide explains how to get the most out of your new car, from how to adjust its settings off of the track to what you’ll see inside of the cockpit while driving. We hope that you’ll find it useful in getting up to speed.
      
      Thanks again for your purchase, and we’ll see you on the track!
      
      ![Image](./assets/bmw-m4-gt3/welcome-car.png)

