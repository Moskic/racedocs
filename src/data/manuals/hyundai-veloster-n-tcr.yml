sections:
  - id: preamble
    level: 2
    bodyZh: |+
      ![欢迎页面](./assets/hyundai-veloster-n-tcr/welcome-hero.png)

      #### 亲爱的 iRacing 用户：

      房车赛一直是全球最受欢迎的公路赛事形式之一，将易于上手的前轮驱动车辆与世界上众多传奇赛道相结合。由此呈现出的激烈贴身对抗，不仅让车手在驾驶席中乐在其中，也令看台上的车迷大呼过瘾。

      Hyundai Veloster N TC 于 2019 年推出，专为现代汽车的北美车队打造，以更好地体现现代汽车在当地市场的布局。该车以开启现代品牌在当代房车赛事统治地位的 Hyundai i30 N TC 为基础，与前代车型共享大部分部件，也很快在赛道上取得相似成功。2019 年是 Veloster 首次参加 IMSA Michelin Pilot Challenge，知名车队 Bryan Herta Autosport 派出的 Veloster 赛车凭借合计四场胜利，包揽最终积分榜前两名。

      再次感谢您的购买，我们赛道上见！

      ![Hyundai Veloster N TCR 赛车](./assets/hyundai-veloster-n-tcr/welcome-car.png)

    bodyEn: |+
      ![Image](./assets/hyundai-veloster-n-tcr/welcome-hero.png)
      
      #### DEAR iRACING USER,
      
      Touring car racing remains one of the world’s most popular forms of road racing, combining approachable front-wheel drive cars with some of the most legendary circuits on the planet. The result is an aggressive, elbows-out form of road racing that proves to be just as much fun for the drivers behind the wheel as it is to watch for the fans in the seats.
      
      Launched in 2019, the Hyundai Veloster N TC was built for Hyundai’s North American teams to better reflect Hyundai’s presence in the market. Based on the Hyundai i30 N TC that kicked off the brand’s modern dominance of the discipline, the Veloster shares a majority of its components with its predecessor, and quickly shared similar successes on the track as well. In 2019, its first season as a part of the IMSA Michelin Pilot Challenge, Velosters campaigned by the prominent Bryan Herta Autosport team went 1-2 in the final standings with a combined four race wins.
      
      Thanks again for your purchase, and we’ll see you on the track!
      
      ![Image](./assets/hyundai-veloster-n-tcr/welcome-car.png)

