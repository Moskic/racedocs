sections:
  - id: preamble
    level: 2
    bodyEn: |+
      ![Image](./assets/mclaren-570s-gt4/welcome-hero.png)
      
      #### DEAR iRACING USER,
      
      Dear iRacing User,
      
      Congratulations on your purchase of the McLaren 570s GT4! From all of us at iRacing, we appreciate your support and your commitment to our product. We aim to deliver the ultimate sim racing experience, and we hope that you’ll find plenty of excitement with us behind the wheel of your new car!
      
      Few manufacturers can match the thrill of driving a McLaren in any class or specification, and the 570S, the legendary brand’s foray into the world of GT4s, is no exception. Powered by a 3.8-liter twin turbo V8 engine and sitting on McLaren’s carbon fiber MonoCell II chassis, this highly agile machine is the car of choice for a number of customer race teams competing in GT4 formula series around the world.
      
      The 570S GT4 broke cover at the 2016 Goodwood Festival of Speed and made its competitive debut in British GT under the brand’s own supervision that same year, allowing customers that took delivery of the cars in 2017 to drive a racer that had been refined in real competition. Since then, it’s proven to be a highly popular car with anyone who’s driven it, setting a high water mark of 140 global podium finishes in 2019.
      
      The following guide explains how to get the most out of your new car, from how to adjust its settings off of the track to what you’ll see inside of the cockpit while driving. We hope that you’ll find it useful in getting up to speed.
      
      Thanks again for your purchase, and we’ll see you on the track!
      
      ![Image](./assets/mclaren-570s-gt4/welcome-car.png)

    bodyZh: |+
      ![图片](./assets/mclaren-570s-gt4/welcome-hero.png)

      #### 亲爱的 iRACING 用户：

      恭喜您购买 McLaren 570S GT4！iRacing 全体成员感谢您的支持与信赖。我们致力于提供极致的模拟赛车体验，也希望您驾驶新车时尽享赛道激情！

      无论级别或规格，McLaren 都能带来难以匹敌的驾驶快感；作为这个传奇品牌进军 GT4 领域的车型，570S 也不例外。它搭载 3.8 升双涡轮增压 V8 发动机和 McLaren 碳纤维 MonoCell II 单体式底盘，凭借极为灵活的动态表现，成为全球众多 GT4 客户车队的选择。

      570S GT4 于 2016 年 Goodwood Festival of Speed 首次公开亮相，同年在品牌厂队监督下参加 British GT。由此，2017 年开始交付给客户的赛车已在真实竞赛中得到充分打磨。此后它深受车手欢迎，并在 2019 年创下全球 140 次登上领奖台的佳绩。

      本指南将说明如何充分发挥新车性能，包括离开赛道后如何调整设置，以及驾驶时座舱内各项显示的含义。希望它能帮助您尽快掌握车辆。

      再次感谢您的购买，我们赛道上见！

      ![图片](./assets/mclaren-570s-gt4/welcome-car.png)

