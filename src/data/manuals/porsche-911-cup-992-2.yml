  - id: introduction
    level: 2
    titleEn: "INTRODUCTION"
    bodyEn: |+
      
      The information found in this guide is intended to provide a deeper understanding of the chassis setup adjustments available in the garage, so that you may use the garage to tune the chassis setup to your preference.
      
      Before diving into chassis adjustments, though, it is best to become familiar with the car and track. To that end, we have provided baseline setups for each track commonly raced by these cars.
      
      To access the baseline setups, simply open the Garage, click iRacing Setups, and select the appropriate setup for your track of choice. If you are driving a track for which a dedicated baseline setup is not included, you may select a setup for a similar track to use as your baseline.
      
      After you have selected an appropriate setup, get on track and focus on making smooth and consistent laps, identifying the proper racing line and experiencing tire wear and handling trends over a number of laps.
      
      Once you are confident that you are nearing your driving potential with the included baseline setups, read on to begin tuning the car to your handling preferences.

  - id: getting-started
    level: 3
    titleEn: "GETTING STARTED"
    bodyEn: |+
      
      ![Image](./assets/porsche-911-cup-992-2/getting-started.png)
      
      Once you load into the car, select 1st gear. Slowly release the clutch while applying the throttle to drive away. A clutch is necessary when coming to a stop to prevent stalling the engine and shifting into reverse if necessary, but the clutch isn’t required once the vehicle is in motion for upshifts or downshifts. Upshifting can be done without lifting off the throttle, however downshifting will require a small throttle blip to unload the transmission. If you downshift too early, or don’t blip the throttle sufficiently, the wheel speed and engine speed will be mismatched, leading to wheel hop at the rear and a possible spin.

  - id: loading-an-iracing-setup
    level: 3
    titleEn: "LOADING AN iRACING SETUP"
    bodyEn: |+
      
      ![Image](./assets/porsche-911-cup-992-2/loading-iracing-setup.png)
      
      Upon loading into a session, the car will automatically load the iRacing Baseline setup `<baseline.sto>`. If you would prefer one of iRacing’s pre-built setups that suit various conditions, you may load it by clicking Garage &gt; iRacing Setups &gt; and then selecting the setup to suit your needs.
      
      If you would like to customize the setup, simply make the changes in the garage that you would like to update and click apply.
      
      If you would like to save your setup for future use click “Save As” on the right to name and save the changes. To access all of your personally saved setups, click “My Setups” on the right side of the garage.
      
      If you would like to share a setup with another driver or everyone in a session, you can select “Share” on the right side of the garage to do so.
      
      If a driver is trying to share a setup with you, you will find it under “Shared Setups” on the right side of the garage as well.

  - id: dash-configuration
    level: 2
    titleEn: "DASH CONFIGURATION"

  - id: race-1-dash-configuration
    level: 3
    titleEn: "RACE 1 DASH CONFIGURATION"
    bodyEn: |+
      
      ![Image](./assets/porsche-911-cup-992-2/race-1-dash-configuration.png)
      
      | Left Column | Description |
      | --- | --- |
      | ABS | Current ABS Setting |
      | TC | Current Traction Control System setting |
      | DIM | Inoperable |
      | ATH | Current Throttle Pedal Map setting |
      | MUL | Inoperable |
      | Oil Temp | Engine Oil Temperature in °F or °C |
      | Oil Press | Engine Oil system pressure in Pounds-per-square-Inch or Bar |
      | Water Temp | Engine cooling water temperature in °F or °C |
      | Water Press | Engine cooling system pressure in Pounds-per-square-Inch or Bar |
      
      | Center Column | Description |
      | --- | --- |
      | Speed | Current speed in Miles-per-hour or Kilometers-per-hour |
      | Gear Indicator | Currently selected gear |
      | Tyre Info | Current tire pressures in pounds per square inch or kilopascals are displayed in the center, tire surface temperatures are shown in the outer corners in °F or °C |
      
      | Right Column | Description |
      | --- | --- |
      | Lap | Current lap number |
      | Laptime | Previously completed lap time |
      | Time Diff | Time difference between the current lap and the session best lap |
      | Pred. Time | Predicted lap time for the current lap |
      | Brake Bias | Current Brake Bias setting, displayed as an offset from 50%. For example, if the brake bias is set to 54% this will display 4.00, while a 48% brake bias will display -2.00. When changing the Brake Bias, a graphical bar will appear on the right side of the display giving an indication of how far forward or rearward the Bias is currently set. |
      | Tire Indicator | The upper-right box displays the current tire fitted to the car |
      | ABS Indicator | If the ABS system is disabled, a red triangle warning indicator will illuminate on the right side of the display. |

