sections:
  - id: preamble
    level: 2
    bodyEn: |+
      ![Image](./assets/porsche-911-cup-992-2/welcome-hero.png)
      
      #### DEAR iRACING USER,
      
      Congratulations on your purchase of the Porsche 911 Cup (992.2)! From all of us at iRacing, we appreciate your support and your commitment to our product. We aim to deliver the ultimate sim racing experience, and we hope that you’ll find plenty of excitement with us behind the wheel of your new car!
      
      The following guide explains how to get the most out of your new car, from how to adjust its settings off of the track to what you’ll see inside of the cockpit while driving. We hope that you’ll find it useful in getting up to speed.
      
      Thanks again for your continued support, and we’ll see you on the track!
      
      ![Image](./assets/porsche-911-cup-992-2/welcome-car.png)

