      | Left Light stack top two LED’s | Illuminates yellow as a pair to indicate a left front lockup |
      | Left Light stack lower two LED’s | Illuminates purple as a pair to indicate left rear wheelspin |
      | Right Light stack top two LED’s | Illuminates yellow as a pair to indicate a right front lockup |
      | Right Light stack lower two LED’s | Illuminates purple as a pair to indicate right rear wheelspin |
      | Row 1 Left | Indicates tire fitted in the real car, relevant for pit limiter and other calibrations |
      | Row 1 Second from left | Indicates usage of the high beam headlights |
      | Row 1 Center | Road speed (km/h or mph) |
      | Row 1 Right | Current session lap number |
      | Row 2 Left | Engine oil temperature (Celsius or Fahrenheit) |
      | Row 2 Center | Currently selected gear |
      | Row 2 Right | Last lap time as mm:ss:ms |
      | Row 3 Left | Engine oil pressure (Bar or psi) |
      | Row 3 Right | Delta to session best lap time as ss:ms |
      | Row 4 Left | Engine water temperature (Celsius or Fahrenheit) |
      | Row 5 Left | Remaining fuel (Litres or US Gallons) |
      | Row 6 Left | Percentage change in brake bias relative to initial value including graphic depiction |
      | Row 6 Center | Current tire pressures arranged in vehicle orientation (kPa or psi) |
      | Row 7 Left | Indicates a fault in the real car when illuminated |
      | Row 7 Second from left | Current ABS/TC/ESC setting |
      | Row 7 Center | Current engine rpm |
      | Row 7 Third from right | TC on/off indicator |
      | Row 7 Second from right | ESC on/off indicator |
      | Row 7 Right | Current gearbox mode: M in normal operation, P in neutral and R in reverse |

