sections:
  - id: preamble
    level: 2
    bodyEn: |+
      ![Image](./assets/porsche-718-cayman-gt4/welcome-hero.png)
      
      #### DEAR iRACING USER,
      
      Congratulations on your purchase of the Porsche 718 Cayman GT4! From all of us at iRacing, we appreciate your support and your commitment to our product. We aim to deliver the ultimate sim racing experience, and we hope that you’ll find plenty of excitement with us behind the wheel of your new car! Few automotive manufacturers are as revered as Porsche, and many drivers will take any opportunity they can get to climb behind the wheel of one of the brand’s iconic vehicles. Enter the 718 Cayman GT4 Clubsport, which combines 425 horsepower of Porsche performance with the nimble, approachable GT4 platform.
      
      The result is a highly popular sports car raced the world over, from single-class championships to the multi-class IMSA Michelin Pilot Challenge (where it makes its home on iRacing). Responsive in its handling and a whole lot of fun, it’s easy to see why the 718 Cayman GT4 Clubsport is also popular as a track day car.
      
      The following guide explains how to get the most out of your new car, from how to adjust its settings off of the track to what you’ll see inside of the cockpit while driving. We hope that you’ll find it useful in getting up to speed.
      
      Thanks again for your purchase, and we’ll see you on the track!
      
      ![Image](./assets/porsche-718-cayman-gt4/welcome-car.png)

